name: "Grant or STSM call content"
description: "Create or update grant or STSM call pages"
title: "[Grant call]: "
labels:
  - "💶 area:grants"
  - "✍️ type:new-content"
  - "❓ status:needs-info"
assignees:
  - OndrejMottl
  - xbenitogranell
body:
  - type: markdown
    attributes:
      value: |
        Use this template for **call pages only**.
        For post-STSM narrative submissions, use **08_stsm_blogpost.yml**.
  - type: dropdown
    id: request-kind
    attributes:
      label: Call request type
      options:
        - New call page
        - Update existing call page
    validations:
      required: true
  - type: input
    id: source-file
    attributes:
      label: Source file (if known)
      description: If unknown, write unknown.
      value: unknown
    validations:
      required: false
  - type: input
    id: cycle
    attributes:
      label: Call cycle or year
      placeholder: STSM 2026 - 3rd call
    validations:
      required: true
  - type: input
    id: target-path
    attributes:
      label: Proposed file path
      placeholder: grants/stms/stms_2026_3rdcall.qmd
    validations:
      required: true
  - type: textarea
    id: eligibility
    attributes:
      label: Eligibility and scope
      render: markdown
      value: |
        ## Eligibility

        Describe who can apply.

        ## Scope

        Describe which activities are supported.
    validations:
      required: true
  - type: textarea
    id: deadlines
    attributes:
      label: Key dates
      render: markdown
      value: |
        - Opens:
        - Submission deadline:
        - Decision date:
        - Activity window:
    validations:
      required: true
  - type: textarea
    id: application-process
    attributes:
      label: Application process and links
      render: markdown
      value: |
        1. Step one
        2. Step two

        Links:
        - https://...
    validations:
      required: true
  - type: textarea
    id: contact-points
    attributes:
      label: Contact points
      render: markdown
      value: |
        - Name, role, email
        - Name, role, email
    validations:
      required: true
  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: I confirm all dates and links are final and public.
          required: true

name: "Website bug report"
description: "Report broken pages, links, rendering, or functional issues"
title: "[Bug]: "
labels:
  - "🐞 type:bug"
  - "❓ status:needs-info"
body:
  - type: dropdown
    id: bug-area
    attributes:
      label: Website area
      options:
        - area:about
        - area:core-group
        - area:working-groups
        - area:events
        - area:outreach
        - area:grants
        - area:join-us
        - area:site-wide
    validations:
      required: true
  - type: input
    id: page-url
    attributes:
      label: Affected page URL
      placeholder: https://palaeopen.github.io/...
    validations:
      required: true
  - type: textarea
    id: current-behavior
    attributes:
      label: Current behavior
      description: What happens now?
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What should happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and device
      placeholder: Chrome 124 on Windows 11, Safari on iPhone, etc.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Screenshots or console errors
      description: Paste screenshots, logs, or error output.
      render: shell
    validations:
      required: false

name: "Archive or remove content"
description: "Request archiving, unlisting, or removal of existing content"
title: "[Archive/Remove]: "
labels:
  - "🗃️ type:archive-remove"
  - "❓ status:needs-info"
assignees:
  - OndrejMottl
  - xbenitogranell
body:
  - type: input
    id: target-url
    attributes:
      label: Target page URL
      placeholder: https://palaeopen.github.io/...
    validations:
      required: true
  - type: input
    id: source-file
    attributes:
      label: Source file (if known)
      description: If unknown, write unknown.
      value: unknown
    validations:
      required: false
  - type: dropdown
    id: action
    attributes:
      label: Requested action
      options:
        - Archive (keep but de-emphasize)
        - Remove from navigation only
        - Remove page entirely
        - Redirect to another page
    validations:
      required: true
  - type: input
    id: redirect-url
    attributes:
      label: Redirect URL (if applicable)
      placeholder: https://palaeopen.github.io/...
    validations:
      required: false
  - type: textarea
    id: rationale
    attributes:
      label: Reason for archive/removal
      render: markdown
      value: |
        Explain why this content should be archived or removed.

        Include decision context or governance reference.
    validations:
      required: true
  - type: input
    id: approved-by
    attributes:
      label: Approval reference
      description: Who approved this action?
      placeholder: Name, role, or meeting reference
    validations:
      required: true

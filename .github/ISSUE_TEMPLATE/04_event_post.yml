name: "Event page or event update"
description: "Create or update event announcements, workshops, schools, and meetings"
title: "[Event]: "
labels:
  - "📅 area:events"
  - "✍️ type:new-content"
  - "❓ status:needs-info"
assignees:
  - OndrejMottl
  - xbenitogranell
body:
  - type: dropdown
    id: request-kind
    attributes:
      label: Event request type
      options:
        - New event page
        - Update existing event page
        - Cancel or postpone event notice
    validations:
      required: true
  - type: input
    id: source-file
    attributes:
      label: Source file (if known)
      description: If unknown, write unknown.
      value: unknown
    validations:
      required: false
  - type: input
    id: event-name
    attributes:
      label: Event name
      placeholder: Basel Workshop 2026
    validations:
      required: true
  - type: input
    id: event-dates
    attributes:
      label: Event date(s)
      placeholder: 2026-05-10 to 2026-05-12
    validations:
      required: true
  - type: input
    id: location
    attributes:
      label: Location
      placeholder: City, Country or Online
    validations:
      required: true
  - type: input
    id: target-path
    attributes:
      label: Proposed file path
      placeholder: events/2026/event_name_2026.qmd
    validations:
      required: true
  - type: textarea
    id: body-text
    attributes:
      label: Full event text
      description: Include registration details, deadlines, and agenda links.
      render: markdown
      value: |
        ## Event overview

        Add event summary.

        ## Program or agenda

        - Item 1
        - Item 2

        ## Registration details

        Add registration and eligibility details.
    validations:
      required: true
  - type: textarea
    id: cta
    attributes:
      label: Calls to action
      value: |
        - Register: https://...
        - More info: https://...
        - Contact: name@example.org
    validations:
      required: true
  - type: textarea
    id: visuals
    attributes:
      label: Event visuals
      description: Poster/logo/image files with source URLs.
      value: |
        - Poster: filename or URL
        - Logo: filename or URL
        - Hero image: filename or URL
    validations:
      required: false

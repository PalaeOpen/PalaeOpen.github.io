name: "New content request"
description: "Request a brand-new page, post, report, call, or section"
title: "[New content]: "
labels:
  - "✍️ type:new-content"
  - "❓ status:needs-info"
body:
  - type: markdown
    attributes:
      value: |
        Please provide complete source material so implementation can be done without back-and-forth.
  - type: dropdown
    id: area
    attributes:
      label: Website area
      description: Where should this content live?
      options:
        - area:about
        - area:core-group
        - area:working-groups
        - area:events
        - area:outreach
        - area:grants
        - area:join-us
        - area:site-wide
    validations:
      required: true
  - type: input
    id: target-path
    attributes:
      label: Preferred page path or filename
      description: Provide a suggested path (for example, events/2026/new_event_2026.qmd)
      placeholder: section/subsection/filename.qmd
    validations:
      required: true
  - type: input
    id: public-title
    attributes:
      label: Public title
      description: Exact title to show on the website
      placeholder: Workshop on Open Palaeo Data 2026
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: One-paragraph summary
      description: This is used for teaser text and page intros.
      placeholder: Provide a concise summary suitable for website visitors.
    validations:
      required: true
  - type: textarea
    id: full-content
    attributes:
      label: Full content draft (Markdown preferred)
      description: Paste the full text. Use headings, lists, links, and callouts as needed.
      render: markdown
    validations:
      required: true
  - type: textarea
    id: links
    attributes:
      label: Source links and references
      description: Add official source URLs, docs, or previous announcements.
      placeholder: |
        - https://...
        - https://...
    validations:
      required: true
  - type: textarea
    id: assets
    attributes:
      label: Media assets to include
      description: List file names or links to logos, images, PDFs, etc.
      placeholder: |
        - Hero image: filename or URL
        - Flyer PDF: filename or URL
    validations:
      required: false
  - type: input
    id: deadline
    attributes:
      label: Publishing deadline
      description: Use YYYY-MM-DD, or write "none"
      placeholder: YYYY-MM-DD
    validations:
      required: true
  - type: input
    id: contact
    attributes:
      label: Requester contact
      description: GitHub handle and/or email for clarification
      placeholder: "@username, name@example.org"
    validations:
      required: true
  - type: checkboxes
    id: rights-check
    attributes:
      label: Content and rights confirmation
      options:
        - label: I confirm this text can be published on the PalaeOpen website.
          required: true
        - label: I confirm I have permission to share any linked media.
          required: true
        - label: I understand missing required information may delay publication.
          required: true

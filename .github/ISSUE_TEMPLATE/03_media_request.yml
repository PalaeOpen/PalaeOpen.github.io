name: "Media and asset request"
description: "Add or update images, logos, PDFs, posters, or downloadable files"
title: "[Media]: "
labels:
  - "🖼️ type:media"
  - "❓ status:needs-info"
assignees:
  - OndrejMottl
  - xbenitogranell
body:
  - type: dropdown
    id: area
    attributes:
      label: Website area
      options:
        - area:about
        - area:core-group
        - area:working-groups
        - area:events
        - area:outreach
        - area:grants
        - area:join-us
        - area:site-wide
    validations:
      required: true
  - type: input
    id: source-file
    attributes:
      label: Source file (if known)
      description: If unknown, write unknown.
      value: unknown
    validations:
      required: false
  - type: input
    id: target-page
    attributes:
      label: Target page URL
      placeholder: https://palaeopen.github.io/...
    validations:
      required: true
  - type: textarea
    id: assets-list
    attributes:
      label: Asset list
      description: For each asset, include filename, source URL, and intended placement.
      render: markdown
      value: |
        - Asset:
          Source:
          Placement:
        - Asset:
          Source:
          Placement:
    validations:
      required: true
  - type: textarea
    id: alt-text
    attributes:
      label: Alt text and captions
      value: |
        - filename.ext: "Accessible alt text or caption"
        - filename.ext: "Accessible alt text or caption"
    validations:
      required: true
  - type: dropdown
    id: replace-or-add
    attributes:
      label: Asset action
      options:
        - Add new asset
        - Replace existing asset
        - Remove existing asset
    validations:
      required: true
  - type: checkboxes
    id: rights
    attributes:
      label: Rights confirmation
      options:
        - label: I confirm publication rights for all submitted assets.
          required: true
        - label: I confirm no sensitive personal data is exposed in provided files.
          required: true

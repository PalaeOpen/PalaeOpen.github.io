name: "Update existing content"
description: "Request edits to an existing page"
title: "[Update content]: "
labels:
  - "🛠️ type:update-content"
  - "❓ status:needs-info"
assignees:
  - OndrejMottl
  - xbenitogranell
body:
  - type: input
    id: page-url
    attributes:
      label: Page URL to update
      placeholder: https://palaeopen.github.io/...
    validations:
      required: true
  - type: input
    id: source-file
    attributes:
      label: Source file (if known)
      description: If unknown, write unknown.
      value: unknown
    validations:
      required: false
  - type: dropdown
    id: update-type
    attributes:
      label: Type of update
      options:
        - Text correction
        - Add a section
        - Remove a section
        - Replace links
        - Update dates
        - Update contacts
        - Structural redesign
        - Other
    validations:
      required: true
  - type: textarea
    id: change-request
    attributes:
      label: Exact change request
      description: Use replace X with Y style whenever possible.
      render: markdown
      value: |
        ### Current
        Paste the exact current text/section.

        ### New
        Paste the exact replacement text/section.

        ### Location in page
        Explain where this change appears.
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: Why this change is needed
      value: |
        Explain the reason, background, and urgency.
    validations:
      required: true
  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: I provided enough detail for implementation without guessing.
          required: true
